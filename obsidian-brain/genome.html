<!DOCTYPE html>
<!--
  genome.html — Master Project DNA / DOM Tree (spec §1 Layer 4, §3).
  Charlotte parses this tree to structure a project's goals and dependencies;
  Babel Tower reads it to decide which linguistic "gear" agents must shift into.
  This is a seed template — populate <goal> / <dep> nodes per project.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HELIXos Genome — seed</title>
</head>
<body>
  <main id="genome" data-version="3.0">
    <section id="macro-goals">
      <!-- Top-level project DNA. Each goal maps to a #T-* Thought channel. -->
      <article class="goal" data-channel="#T-root" data-status="pending">
        <h1>Root goal</h1>
        <p>Replace with the project's overarching objective.</p>
      </article>
    </section>
    <section id="dependencies">
      <!-- Structural dependencies between goals. -->
    </section>
  </main>
</body>
</html>
